# 多智能體投研 — 國際盤 + 台股「市場快訊」定時 broadcast（Phase 1 資料鏈消費端）
#
# 資料鏈（全在 GitHub Actions，無 NAS、無互動門）：
#   my-fund-dashboard  → export_db.yml → fund.db  →（本 repo）data 分支
#   my-stock-dashboard → export_db.yml → stock.db →（本 repo）data 分支
#   mynews             → export_db.yml → news.db  →（本 repo）data 分支
#        │                    │                    │
#        └──────── 本 workflow checkout 三個 data 分支 ────────┘
#                             │
#              run_pipeline.py --market-digest（讀總經+新聞→判讀→組卡）
#                             │
#                    LINE broadcast 全體好友（國際情勢＋台股）
#
# 需要的 Secrets（本 repo → Settings → Secrets and variables → Actions）：
#   DATA_REPO_TOKEN            —— GitHub PAT，對三個來源 repo 有 contents:read（讀 data 分支）。
#   LINE_CHANNEL_ACCESS_TOKEN  —— 2026 專用 LINE bot 的 channel access token（broadcast 用）。
#
# 時區：cron 一律 UTC。台灣 = UTC+8。來源 export 於 UTC 21:00（TW 05:00）產出，
#       本消費端排在其後，確保讀到當日最新資料。

name: market-digest-broadcast

on:
  schedule:
    - cron: "30 23 * * 0-4"  # 07:30 TW（盤前，國際盤收盤後）= 前一日 23:30 UTC，週日~四
    - cron: "30 8 * * 1-5"   # 16:30 TW（台股收盤後）= 當日 08:30 UTC，週一~五
  workflow_dispatch:
    inputs:
      session:
        description: "morning（早盤前）/ afternoon（收盤後）"
        default: "morning"

permissions:
  contents: write   # 判讀存回本 repo 的 ledger 分支需寫入（走內建 GITHUB_TOKEN）

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 2026（本系統）
        uses: actions/checkout@v4

      # ---- 取三個來源 repo 的 data 分支（各含一顆 DB）----
      - name: Checkout fund.db（my-fund-dashboard@data）
        uses: actions/checkout@v4
        with:
          repository: linchen-20200325/my-fund-dashboard
          ref: data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: _data/fund

      - name: Checkout stock.db（my-stock-dashboard@data）
        uses: actions/checkout@v4
        with:
          repository: linchen-20200325/my-stock-dashboard
          ref: data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: _data/stock

      - name: Checkout news.db（mynews@data）
        uses: actions/checkout@v4
        with:
          repository: linchen-20200325/mynews
          ref: data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: _data/news

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps（CLI 只需核心運算，免 streamlit）
        run: pip install "pandas>=2.0,<4.0" "numpy>=1.24"

      - name: Decide session
        id: sess
        run: |
          # 兩個 cron：morning 23:30 UTC（TW 07:30 盤前）；afternoon 08:30 UTC（TW 16:30 收盤後）。
          # UTC 小時 >= 20 或 < 4 → 對應 TW 清晨 → morning；其餘 → afternoon。
          H="$(date -u +%-H)"
          if [ -n "${{ github.event.inputs.session }}" ]; then
            echo "session=${{ github.event.inputs.session }}" >> "$GITHUB_OUTPUT"
          elif [ "$H" -ge 20 ] || [ "$H" -lt 4 ]; then
            echo "session=morning" >> "$GITHUB_OUTPUT"
          else
            echo "session=afternoon" >> "$GITHUB_OUTPUT"
          fi

      - name: Sanity check DB 檔存在
        run: |
          for f in _data/fund/fund.db _data/stock/stock.db _data/news/news.db; do
            if [ ! -f "$f" ]; then echo "::error::缺 $f（來源 export 尚未跑或 data 分支無此檔）"; exit 1; fi
            echo "✅ $f ($(du -h "$f" | cut -f1))"
          done

      - name: 取回既有 ledger.jsonl（累積判讀；ledger 分支首次不存在則從空開始）
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          REMOTE="https://x-access-token:${GIT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git fetch --depth 1 "$REMOTE" ledger 2>/dev/null; then
            git cat-file -p FETCH_HEAD:ledger.jsonl > ledger.jsonl 2>/dev/null \
              && echo "取回既有 ledger（$(wc -l < ledger.jsonl) 列）" \
              || echo "ledger 分支無 ledger.jsonl → 從空開始"
          else
            echo "ledger 分支尚不存在 → 從空開始"
          fi

      - name: Broadcast 市場快訊 + 記錄大盤判讀
        env:
          FUND_DB: _data/fund/fund.db
          STOCK_DB: _data/stock/stock.db
          NEWS_DB: _data/news/news.db
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LEDGER_FILE: ledger.jsonl
        run: |
          # 未設 LINE token（例如手動排練）→ 加 --dry-run 只印不推，避免 workflow 失敗。
          DRY=""
          if [ -z "${LINE_CHANNEL_ACCESS_TOKEN}" ]; then
            echo "::warning::未設 LINE_CHANNEL_ACCESS_TOKEN → --dry-run 只預覽不推播"
            DRY="--dry-run"
          fi
          python run_pipeline.py --session "${{ steps.sess.outputs.session }}" --market-digest --record $DRY

      - name: 存回 ledger.jsonl → ledger 分支（orphan force-push，全歷史留在檔內）
        if: hashFiles('ledger.jsonl') != ''
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          REMOTE="https://x-access-token:${GIT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          tmp="$(mktemp -d)"; cp ledger.jsonl "$tmp/ledger.jsonl"; cd "$tmp"
          git init -q && git checkout -q -b ledger
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git add ledger.jsonl
          git -c commit.gpgsign=false commit -q -m "chore(ledger): 判讀累積 $(date -u +%FT%TZ)"
          if git push -f "$REMOTE" ledger; then
            echo "ledger 已存回（$(wc -l < ledger.jsonl) 列）"
          else
            echo "::warning::ledger push 失敗（本次判讀未持久化；廣播已完成）"
          fi
